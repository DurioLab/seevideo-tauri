name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache cargo install binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version '^1.6' --locked --force

      - name: Build Tauri app bundles
        shell: bash
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_PRIVATE_KEY: ''
          TAURI_KEY_PASSWORD: ''

      - name: Upload macOS artifacts
        if: matrix.os_name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          if-no-files-found: error
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Windows MSI artifacts
        if: matrix.os_name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          if-no-files-found: error
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload Windows NSIS artifacts
        if: matrix.os_name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          if-no-files-found: error
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
